name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Fetches the model from the GitHub Release (model-assets.json) via `prepare`,
    # builds, and runs the parity tests. Requires the Release assets to exist.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
      - run: bun run build

  wasm-build:
    # Reproducibility guard: the prebuilt wasm must still build from crate/.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli (match crate dep)
        run: cargo install wasm-bindgen-cli --version 0.2.126
      - name: Build wasm
        working-directory: crate
        run: |
          cargo build --release --target wasm32-unknown-unknown
          wasm-bindgen --target nodejs --out-dir pkg \
            target/wasm32-unknown-unknown/release/vntok_wasm.wasm
          test -f pkg/vntok_wasm_bg.wasm
